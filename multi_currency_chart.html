<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Currency TradingView Chart</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', Roboto, Arial, sans-serif;
    background: #131722;
    color: #d1d4dc;
    overflow: hidden;
}

/* LEFT TOOLBAR */
#left-toolbar {
    position: fixed;
    left: 0;
    top: 0;
    width: 42px;
    height: 100vh;
    background: #1e222d;
    border-right: 1px solid #2a2e39;
    display: flex;
    flex-direction: column;
    padding: 8px 0;
    z-index: 100;
}
.tool-btn {
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #787b86;
    transition: all 0.2s;
    border: none;
    background: transparent;
}
.tool-btn:hover { background: #2a2e39; color: #d1d4dc; }
.tool-btn.active { color: #2962ff; }
.tool-separator { height: 1px; background: #2a2e39; margin: 8px 6px; }

/* TOP BAR */
#top-bar {
    position: fixed;
    top: 0;
    left: 42px;
    right: 0;
    height: 48px;
    background: #1e222d;
    border-bottom: 1px solid #2a2e39;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 12px;
    z-index: 99;
}
.symbol-info {
    display: flex;
    align-items: center;
    gap: 8px;
}
.symbol-name {
    font-size: 16px;
    font-weight: 600;
    color: #f8f9fa;
    letter-spacing: 0.3px;
}
.symbol-desc {
    font-size: 12px;
    color: #787b86;
}

/* CURRENCY SELECTOR */
.currency-group {
    display: flex;
    gap: 2px;
    margin-left: 16px;
}
.currency-btn {
    background: transparent;
    border: 1px solid #434651;
    color: #787b86;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    font-weight: 500;
}
.currency-btn:hover { background: #2a2e39; color: #d1d4dc; }
.currency-btn.active { background: #2962ff; color: #fff; border-color: #2962ff; }

.tf-group {
    display: flex;
    gap: 2px;
    margin-left: 16px;
}
.tf-btn {
    background: transparent;
    border: none;
    color: #787b86;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    font-weight: 500;
}
.tf-btn:hover { background: #2a2e39; color: #d1d4dc; }
.tf-btn.active { background: #2962ff; color: #fff; }
.spacer { flex: 1; }
.top-btn {
    background: transparent;
    border: 1px solid #434651;
    color: #d1d4dc;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
}
.top-btn:hover { background: #2a2e39; }

/* CHART AREA */
#chart-area {
    position: fixed;
    top: 48px;
    left: 42px;
    right: 0;
    bottom: 24px;
    background: #131722;
}
canvas {
    position: absolute;
    top: 0;
    left: 0;
    cursor: crosshair;
}

/* BOTTOM BAR */
#bottom-bar {
    position: fixed;
    bottom: 0;
    left: 42px;
    right: 0;
    height: 24px;
    background: #1e222d;
    border-top: 1px solid #2a2e39;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 11px;
    color: #787b86;
    gap: 16px;
}
#bottom-bar b { color: #d1d4dc; font-weight: 500; }

/* TOOLTIP */
#tooltip {
    position: absolute;
    background: rgba(19, 23, 34, 0.98);
    border: 1px solid #2a2e39;
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    z-index: 200;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    min-width: 160px;
}
.tt-time { color: #787b86; margin-bottom: 8px; font-size: 11px; font-weight: 500; }
.tt-row { 
    display: flex; 
    justify-content: space-between; 
    gap: 24px;
    margin: 4px 0;
    font-size: 12px;
}
.tt-label { color: #787b86; }
.tt-value { color: #d1d4dc; font-weight: 500; font-family: 'Courier New', monospace; }

/* LOADING */
#loading {
    position: absolute;
    inset: 0;
    background: rgba(19, 23, 34, 0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    z-index: 1000;
}
.spinner {
    width: 48px;
    height: 48px;
    border: 4px solid #2a2e39;
    border-top-color: #2962ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-text { color: #787b86; font-size: 14px; }
.progress-bar {
    width: 320px;
    height: 3px;
    background: #2a2e39;
    border-radius: 2px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #2962ff, #4a90e2);
    width: 0%;
    transition: width 0.3s;
}

/* PRICE LEGEND */
#price-legend {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(19, 23, 34, 0.85);
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 11px;
    display: flex;
    gap: 16px;
    backdrop-filter: blur(10px);
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-label { color: #787b86; }
.legend-value { 
    color: #d1d4dc; 
    font-weight: 600; 
    font-family: 'Courier New', monospace;
    font-size: 12px;
}
.legend-change { font-weight: 600; }
.legend-change.up { color: #26a69a; }
.legend-change.down { color: #ef5350; }
</style>
</head>
<body>

<!-- LEFT TOOLBAR -->
<div id="left-toolbar">
    <button class="tool-btn active" title="Crosshair">✕</button>
    <button class="tool-btn" title="Trend Line">╱</button>
    <button class="tool-btn" title="Horizontal Line">─</button>
    <div class="tool-separator"></div>
    <button class="tool-btn" title="Rectangle">▭</button>
    <button class="tool-btn" title="Circle">○</button>
    <button class="tool-btn" title="Text">T</button>
    <div class="tool-separator"></div>
    <button class="tool-btn" title="Indicators">ƒ</button>
    <button class="tool-btn" title="Alerts">🔔</button>
</div>

<!-- TOP BAR -->
<div id="top-bar">
    <div class="symbol-info">
        <span class="symbol-name" id="symbol-name">EURUSD</span>
        <span class="symbol-desc" id="symbol-desc">Euro / US Dollar</span>
    </div>
    
    <!-- CURRENCY SELECTOR -->
    <div class="currency-group">
        <button class="currency-btn active" onclick="setCurrency('EURUSD')">EUR/USD</button>
        <button class="currency-btn" onclick="setCurrency('GBPUSD')">GBP/USD</button>
    </div>
    
    <div class="tf-group">
        <button class="tf-btn" onclick="setTF('1')">1</button>
        <button class="tf-btn" onclick="setTF('5')">5</button>
        <button class="tf-btn" onclick="setTF('15')">15</button>
        <button class="tf-btn" onclick="setTF('30')">30</button>
        <button class="tf-btn active" onclick="setTF('60')">1H</button>
        <button class="tf-btn" onclick="setTF('240')">4H</button>
        <button class="tf-btn" onclick="setTF('D')">D</button>
    </div>
    <div class="spacer"></div>
    <button class="top-btn">Indicators</button>
    <button class="top-btn">⚙</button>
    <button class="top-btn">📷</button>
</div>

<!-- CHART AREA -->
<div id="chart-area">
    <canvas id="canvas"></canvas>
    <div id="price-legend">
        <div class="legend-item"><span class="legend-label">O</span><span class="legend-value" id="lO">—</span></div>
        <div class="legend-item"><span class="legend-label">H</span><span class="legend-value" id="lH">—</span></div>
        <div class="legend-item"><span class="legend-label">L</span><span class="legend-value" id="lL">—</span></div>
        <div class="legend-item"><span class="legend-label">C</span><span class="legend-value" id="lC">—</span></div>
        <div class="legend-item"><span class="legend-change" id="lChg">—</span></div>
    </div>
    <div id="tooltip"></div>
    <div id="loading">
        <div class="spinner"></div>
        <div class="load-text">Loading market data...</div>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    </div>
</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
    <span><b id="bCount">0</b> bars</span>
    <span>Range: <b id="bRange">—</b></span>
    <span id="bInfo">Multi-Currency Chart • 2021-2026 Real Tick Data</span>
</div>

<script>
// Chart variables
let data = [], currentCurrency = 'EURUSD', currentTF = '1h';
let vStart = 0, vCount = 120, drag = false, dragX = 0, dragS = 0;
let mx = -1, my = -1, dpr = 1, W = 0, H = 0;

const PAD = { top: 50, right: 70, bottom: 30, left: 10 };
const COL = {
    bg: '#131722', grid: '#2a2e39', text: '#787b86', textBright: '#d1d4dc',
    bull: '#26a69a', bear: '#ef5350', cross: '#787b86',
    priceBull: '#26a69a', priceBear: '#ef5350'
};

const area = document.getElementById('chart-area');
const cv = document.getElementById('canvas');
const ctx = cv.getContext('2d');
const tip = document.getElementById('tooltip');
const load = document.getElementById('loading');
const prog = document.getElementById('progress');

// Currency info
const CURRENCIES = {
    'EURUSD': { name: 'EURUSD', desc: 'Euro / US Dollar', prefix: '' },
    'GBPUSD': { name: 'GBPUSD', desc: 'British Pound / US Dollar', prefix: 'gbpusd_' }
};

// Chart functions (same as before)
const cW = () => W - PAD.left - PAD.right;
const cH = () => H - PAD.top - PAD.bottom;
const px = v => Math.round(v);

function getVis() {
    const s = Math.max(0, Math.min(vStart, data.length - 1));
    return data.slice(s, Math.min(s + vCount, data.length));
}

function getRange(arr) {
    let hi = -Infinity, lo = Infinity;
    arr.forEach(c => {
        if (c.h > hi) hi = c.h;
        if (c.l < lo) lo = c.l;
    });
    const r = hi - lo || hi * 0.01 || 1;
    return { hi: hi + r * 0.06, lo: lo - r * 0.04 };
}

function toY(p, lo, hi) {
    const r = hi - lo;
    if (!r) return PAD.top + cH() / 2;
    return PAD.top + cH() * (1 - (p - lo) / r);
}

function fmt(v) {
    return v >= 10 ? v.toFixed(2) : v.toFixed(5);
}

// Currency switching
window.setCurrency = function(currency) {
    if (currency === currentCurrency) return;
    
    document.querySelectorAll('.currency-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    
    currentCurrency = currency;
    const info = CURRENCIES[currency];
    document.getElementById('symbol-name').textContent = info.name;
    document.getElementById('symbol-desc').textContent = info.desc;
    
    // Load data for new currency
    loadData();
};

// Timeframe switching
window.setTF = function(tf) {
    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    
    const tfMap = {
        '1': '1min', '5': '5min', '15': '15min', '30': '30min',
        '60': '1h', '240': '4h', 'D': '1d'
    };
    
    const tfName = tfMap[tf] || '1h';
    if (tfName === currentTF) return;
    
    currentTF = tfName;
    loadData();
};

async function loadData() {
    const info = CURRENCIES[currentCurrency];
    const filename = `${info.prefix}candles_${currentTF}.json`;
    
    load.style.display = 'flex';
    load.querySelector('.load-text').textContent = `Loading ${currentCurrency} ${currentTF}...`;
    prog.style.width = '0%';
    
    try {
        const res = await fetch(filename);
        if (!res.ok) throw new Error(`${currentCurrency} ${currentTF} data not found`);
        
        const json = await res.json();
        data = json.candles || [];
        
        vCount = Math.min(120, data.length);
        vStart = Math.max(0, data.length - vCount);
        
        load.style.display = 'none';
        resize();
        console.log(`✓ ${data.length.toLocaleString()} ${currentCurrency} ${currentTF} candles loaded`);
    } catch (e) {
        load.querySelector('.load-text').textContent = `Error: ${e.message}`;
        console.error(e);
    }
}

// Drawing and interaction functions would go here (same as index.html)
// ... (truncated for brevity)

// Initialize
loadData();
</script>
</body>
</html>
