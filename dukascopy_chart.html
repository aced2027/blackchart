<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dukascopy Chart</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#fff;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;font-family:'Courier New',monospace}
/* ── TOP BAR ── */
#top{display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid #efefef;flex-shrink:0;flex-wrap:wrap}
.sym{font-size:13px;font-weight:700;letter-spacing:.07em;color:#222;min-width:70px}
.tfs{display:flex;border:1px solid #e2e2e2;border-radius:2px;overflow:hidden}
.tf{background:none;border:none;border-right:1px solid #e2e2e2;padding:4px 9px;font:10px 'Courier New',monospace;cursor:pointer;color:#999;transition:all .1s}
.tf:last-child{border-right:none}
.tf:hover{background:#f5f5f5;color:#333}
.tf.on{background:#089981;color:#fff}
.sp{flex:1}
/* load button */
#loadBtn{display:flex;align-items:center;gap:5px;padding:4px 11px;border:1px solid #e2e2e2;background:#fff;font:10px 'Courier New',monospace;cursor:pointer;color:#555;border-radius:2px;transition:all .12s}
#loadBtn:hover{border-color:#089981;color:#089981}
#fileIn{display:none}
/* live badge */
#live{background:#1a73e8;color:#fff;font-size:9px;font-weight:700;letter-spacing:.12em;padding:3px 7px;border-radius:2px}
/* ohlc */
#obar{display:flex;gap:13px;font-size:10px;color:#aaa;letter-spacing:.02em}
#obar b{font-weight:600}
#pct{font-weight:700;min-width:60px}
/* ── CHART ── */
#cw{flex:1;position:relative;overflow:hidden;cursor:crosshair;background:#fff}
canvas{position:absolute;top:0;left:0;display:block}
/* ── TOOLTIP ── */
#tt{position:absolute;background:rgba(255,255,255,.97);border:1px solid #ddd;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:9px 12px;font:10px 'Courier New',monospace;line-height:2;pointer-events:none;display:none;z-index:20;min-width:140px}
.tdate{color:#aaa;font-size:9px;margin-bottom:3px;letter-spacing:.03em}
.trow{display:flex;justify-content:space-between;gap:14px}
.tv{font-weight:700;letter-spacing:.02em}
/* ── STATUS ── */
#sb{display:flex;align-items:center;gap:18px;padding:4px 12px;border-top:1px solid #f0f0f0;font-size:9px;color:#ccc;flex-shrink:0;flex-wrap:wrap}
#sb b{color:#aaa}
#prog{display:none;align-items:center;gap:8px;font-size:10px;color:#1a73e8}
.spinner{width:12px;height:12px;border:2px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
<!-- TOP BAR -->
<div id="top">
<span class="sym" id="symLabel">EURUSD</span>
<div class="tfs">
<button class="tf" onclick="rebuildTF('1m')">1m</button>
<button class="tf" onclick="rebuildTF('5m')">5m</button>
<button class="tf" onclick="rebuildTF('15m')">15m</button>
<button class="tf on" id="tf-1h" onclick="rebuildTF('1h')">1H</button>
<button class="tf" onclick="rebuildTF('4h')">4H</button>
<button class="tf" onclick="rebuildTF('1d')">1D</button>
</div>
<!-- File loader -->
<input type="file" id="fileIn" accept=".json,.csv" onchange="loadFile(this)">
<button id="loadBtn" onclick="document.getElementById('fileIn').click()">📂 Load candles.json</button>
<div class="sp"></div>
<span id="live">LIVE</span>
<div id="obar">
<span>O&nbsp;<b id="vO">—</b></span>
<span>H&nbsp;<b id="vH">—</b></span>
<span>L&nbsp;<b id="vL">—</b></span>
<span>C&nbsp;<b id="vC">—</b></span>
<span id="pct">—</span>
</div>
</div>
<!-- CHART -->
<div id="cw">
<canvas id="cv"></canvas>
<div id="tt"></div>
<!-- Loading overlay -->
<div id="overlay" style="display:none;position:absolute;inset:0;background:rgba(255,255,255,.85);align-items:center;justify-content:center;flex-direction:column;gap:12px;font:12px 'Courier New',monospace;color:#555">
<div class="spinner" style="width:24px;height:24px;border-width:3px"></div>
<span id="overlayMsg">Loading...</span>
</div>
</div>
<!-- STATUS -->
<div id="sb">
<span><b id="sN">0</b> candles</span>
<span>range&nbsp;<b id="sR">—</b></span>
<span>last&nbsp;<b id="sL">—</b></span>
<span id="sH">load candles.json to begin · scroll=zoom · drag=pan · dbl-click=reset</span>
</div>
</div>
<script>
// ── CONFIG ────────────────────────────────────────────────────
const P = { top: 16, right: 70, bot: 28, left: 4 };

// ── STATE ─────────────────────────────────────────────────────
let data = [], vStart = 0, vCount = 80, drag = false, dragX = 0, dragS = 0, mx = -1, my = -1, dpr = 1, W = 0, H = 0;
const wrap = document.getElementById('cw'), cv = document.getElementById('cv'), ctx = cv.getContext('2d'), tip = document.getElementById('tt');

// ── HELPERS ───────────────────────────────────────────────────
const cW = () => W - P.left - P.right;
const cH = () => H - P.top - P.bot;
const px = v => Math.round(v);

function slice() {
    const s = Math.max(0, Math.min(vStart, data.length - 1));
    return data.slice(s, Math.min(s + vCount, data.length));
}

function extent(sl) {
    let hi = -Infinity, lo = Infinity;
    sl.forEach(c => {
        if (c.h > hi) hi = c.h;
        if (c.l < lo) lo = c.l;
    });
    const rng = hi - lo || hi * 0.01 || 1;
    return { hi: hi + rng * 0.07, lo: lo - rng * 0.04 };
}

function toY(p, lo, hi) {
    const rng = hi - lo;
    if (!rng) return P.top + cH() / 2;
    return P.top + cH() * (1 - (p - lo) / rng);
}

function fmt(v) {
    return v >= 1000 ? v.toLocaleString('en', { maximumFractionDigits: 2 }) : v.toFixed(4);
}

// ── DRAW ──────────────────────────────────────────────────────
function draw() {
    // reset ctx
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
    ctx.textAlign = 'left';
    ctx.clearRect(0, 0, cv.width, cv.height);
    
    const sl = slice();
    if (!sl.length) return;
    
    const { hi, lo } = extent(sl);
    const w = cW(), h = cH();
    const slot = w / sl.length;
    const cw = Math.max(1, px(slot * 0.65));
    const hw = Math.max(1, Math.floor(cw / 2));
    
    // GRID
    ctx.strokeStyle = 'rgba(0,0,0,.05)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 5; i++) {
        const y = px(toY(lo + (hi - lo) * i / 5, lo, hi));
        ctx.beginPath();
        ctx.moveTo(P.left, y);
        ctx.lineTo(W - P.right, y);
        ctx.stroke();
    }
    
    // PRICE AXIS
    ctx.fillStyle = '#aaa';
    ctx.font = "10px 'Courier New',monospace";
    ctx.textAlign = 'left';
    for (let i = 0; i <= 5; i++) {
        const p = lo + (hi - lo) * i / 5;
        const y = px(toY(p, lo, hi));
        ctx.fillText(fmt(p), W - P.right + 5, y + 3);
    }
    
    // TIME AXIS
    ctx.fillStyle = '#bbb';
    ctx.textAlign = 'center';
    const ev = Math.ceil(sl.length / 7);
    sl.forEach((c, i) => {
        if (i % ev !== 0) return;
        const x = px(P.left + i * slot + slot / 2);
        const d = new Date(c.t);
        ctx.fillText(String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'), x, H - P.bot + 14);
    });
    
    // PRE-CALC candle pixels
    const bulls = [], bears = [];
    sl.forEach((c, i) => {
        const isBull = c.c >= c.o;
        const cx = px(P.left + i * slot + slot / 2);
        const bt = px(toY(Math.max(c.o, c.c), lo, hi));
        const bb = px(toY(Math.min(c.o, c.c), lo, hi));
        const bh = Math.max(1, bb - bt);
        const wt = px(toY(c.h, lo, hi));
        const wb = px(toY(c.l, lo, hi));
        (isBull ? bulls : bears).push({ cx, bt, bb, bh, wt, wb });
    });
    
    // PASS 1 — ALL WICKS batched
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.beginPath();
    [...bulls, ...bears].forEach(({ cx, bt, bb, wt, wb }) => {
        if (wt < bt) { ctx.moveTo(cx, wt); ctx.lineTo(cx, bt) }   // upper wick
        if (wb > bb) { ctx.moveTo(cx, bb); ctx.lineTo(cx, wb) }    // lower wick
    });
    ctx.stroke();
    
    // PASS 2 — BULL BODIES (hollow: white fill + black border)
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    bulls.forEach(({ cx, bt, bh }) => {
        ctx.fillRect(cx - hw, bt, cw, bh);
        ctx.strokeRect(cx - hw + 0.5, bt + 0.5, cw - 1, Math.max(0, bh - 1));
    });
    
    // PASS 3 — BEAR BODIES (solid black)
    ctx.fillStyle = '#000';
    bears.forEach(({ cx, bt, bh }) => ctx.fillRect(cx - hw, bt, cw, bh));
    
    // LAST PRICE LINE + TAG
    const last = sl[sl.length - 1];
    const ly = px(toY(last.c, lo, hi));
    const isBullLast = last.c >= last.o;
    ctx.setLineDash([2, 4]);
    ctx.strokeStyle = 'rgba(0,0,0,.2)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(P.left, ly);
    ctx.lineTo(W - P.right, ly);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // tag box
    const tH = 16, tW = P.right - 2;
    ctx.fillStyle = isBullLast ? '#089981' : '#f23645';
    ctx.fillRect(W - P.right + 1, ly - tH / 2, tW, tH);
    ctx.fillStyle = '#fff';
    ctx.font = "bold 9px 'Courier New',monospace";
    ctx.textAlign = 'center';
    ctx.fillText(fmt(last.c), W - P.right + tW / 2, ly + 3);
    
    // CROSSHAIR
    if (mx > P.left && mx < W - P.right && my > P.top && my < H - P.bot) {
        ctx.setLineDash([2, 4]);
        ctx.strokeStyle = 'rgba(0,0,0,.18)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(mx, P.top);
        ctx.lineTo(mx, H - P.bot);
        ctx.moveTo(P.left, my);
        ctx.lineTo(W - P.right, my);
        ctx.stroke();
        ctx.setLineDash([]);
        
        // hover price label
        const hp = lo + (hi - lo) * (1 - (my - P.top) / cH());
        ctx.fillStyle = '#555';
        ctx.font = "9px 'Courier New',monospace";
        ctx.textAlign = 'left';
        ctx.fillText(fmt(hp), W - P.right + 5, my + 3);
    }
    
    // OHLC BAR update
    const idx = Math.floor((mx - P.left) / slot);
    const hov = (idx >= 0 && idx < sl.length) ? sl[idx] : last;
    const pct = ((hov.c - hov.o) / hov.o * 100).toFixed(2);
    document.getElementById('vO').textContent = fmt(hov.o);
    document.getElementById('vH').textContent = fmt(hov.h);
    document.getElementById('vL').textContent = fmt(hov.l);
    document.getElementById('vC').textContent = fmt(hov.c);
    const pEl = document.getElementById('pct');
    pEl.textContent = (hov.c >= hov.o ? '+' : '') + pct + '%';
    pEl.style.color = hov.c >= hov.o ? '#089981' : '#f23645';
    
    document.getElementById('sN').textContent = data.length;
    document.getElementById('sL').textContent = fmt(last.c);
}

// ── TOOLTIP ───────────────────────────────────────────────────
function updateTip(e) {
    const rc = wrap.getBoundingClientRect();
    const ex = e.clientX - rc.left, ey = e.clientY - rc.top;
    const sl = slice();
    if (!sl.length) return;
    
    const slot = cW() / sl.length;
    const i = Math.floor((ex - P.left) / slot);
    if (i >= 0 && i < sl.length) {
        const c = sl[i], pct = ((c.c - c.o) / c.o * 100).toFixed(2);
        const d = new Date(c.t);
        const dt = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + '  ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        tip.innerHTML = `<div class="tdate">${dt}</div><div class="trow"><span>O</span><span class="tv">${fmt(c.o)}</span></div><div class="trow"><span>H</span><span class="tv">${fmt(c.h)}</span></div><div class="trow"><span>L</span><span class="tv">${fmt(c.l)}</span></div><div class="trow"><span>C</span><span class="tv">${fmt(c.c)}</span></div><div class="trow"><span>Δ</span><span class="tv">${c.c >= c.o ? '+' : ''}${pct}%</span></div>`;
        tip.style.display = 'block';
        const tw = tip.offsetWidth, th = tip.offsetHeight;
        const tx = ex + 14 + tw > W ? ex - tw - 8 : ex + 14;
        const ty = Math.max(P.top, Math.min(ey - th / 2, H - P.bot - th));
        tip.style.left = tx + 'px';
        tip.style.top = ty + 'px';
    } else tip.style.display = 'none';
}

// ── EVENTS ────────────────────────────────────────────────────
wrap.addEventListener('mousemove', e => {
    const rc = wrap.getBoundingClientRect();
    mx = e.clientX - rc.left;
    my = e.clientY - rc.top;
    if (drag) {
        const dx = mx - dragX;
        const delta = Math.round(-dx / (cW() / vCount));
        vStart = Math.max(0, Math.min(dragS + delta, data.length - vCount));
    }
    updateTip(e);
    draw();
});

wrap.addEventListener('mouseleave', () => {
    mx = -1;
    my = -1;
    tip.style.display = 'none';
    drag = false;
    wrap.style.cursor = 'crosshair';
    draw();
});

wrap.addEventListener('mousedown', e => {
    drag = true;
    dragX = e.clientX - wrap.getBoundingClientRect().left;
    dragS = vStart;
    wrap.style.cursor = 'grabbing';
});

wrap.addEventListener('mouseup', () => {
    drag = false;
    wrap.style.cursor = 'crosshair';
});

wrap.addEventListener('wheel', e => {
    e.preventDefault();
    vCount = Math.max(10, Math.min(data.length, vCount + (e.deltaY > 0 ? 8 : -8)));
    vStart = Math.max(0, Math.min(vStart, data.length - vCount));
    draw();
}, { passive: false });

wrap.addEventListener('dblclick', () => {
    vCount = 80;
    vStart = Math.max(0, data.length - vCount);
    draw();
});

// ── TIMEFRAME ─────────────────────────────────────────────────
window.rebuildTF = function(tf) {
    document.querySelectorAll('.tf').forEach(b => b.classList.remove('on'));
    const btn = document.querySelector(`#tf-${tf}`);
    if (btn) btn.classList.add('on');
    
    // Filter data based on timeframe if we have data
    if (data.length > 0) {
        draw();
    }
};

// ── FILE LOADING ──────────────────────────────────────────────
window.loadFile = function(input) {
    const file = input.files[0];
    if (!file) return;
    
    showOverlay('Loading file...');
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const content = e.target.result;
            let jsonData;
            
            if (file.name.endsWith('.json')) {
                jsonData = JSON.parse(content);
            } else if (file.name.endsWith('.csv')) {
                // Parse CSV format
                const lines = content.split('\n').filter(line => line.trim());
                const headers = lines[0].split(',');
                jsonData = {
                    symbol: 'EURUSD',
                    timeframe: '1h',
                    candles: []
                };
                
                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(',');
                    if (values.length >= 5) {
                        jsonData.candles.push({
                            t: parseInt(values[0]) || Date.parse(values[0]),
                            o: parseFloat(values[1]),
                            h: parseFloat(values[2]),
                            l: parseFloat(values[3]),
                            c: parseFloat(values[4])
                        });
                    }
                }
            }
            
            if (jsonData && jsonData.candles && jsonData.candles.length > 0) {
                data = jsonData.candles;
                document.getElementById('symLabel').textContent = jsonData.symbol || 'EURUSD';
                
                // Set initial view
                vCount = Math.min(80, data.length);
                vStart = Math.max(0, data.length - vCount);
                
                // Update status
                const first = new Date(data[0].t);
                const last = new Date(data[data.length - 1].t);
                document.getElementById('sR').textContent = 
                    first.toLocaleDateString() + ' - ' + last.toLocaleDateString();
                document.getElementById('sH').textContent = 
                    `${data.length} candles loaded · scroll=zoom · drag=pan · dbl-click=reset`;
                
                hideOverlay();
                draw();
            } else {
                throw new Error('Invalid file format');
            }
        } catch (error) {
            hideOverlay();
            alert('Error loading file: ' + error.message);
        }
    };
    
    reader.readAsText(file);
};

// ── OVERLAY HELPERS ───────────────────────────────────────────
function showOverlay(msg) {
    const overlay = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlayMsg');
    overlayMsg.textContent = msg;
    overlay.style.display = 'flex';
}

function hideOverlay() {
    document.getElementById('overlay').style.display = 'none';
}

// ── RESIZE ────────────────────────────────────────────────────
function resize() {
    dpr = window.devicePixelRatio || 1;
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    cv.width = Math.round(W * dpr);
    cv.height = Math.round(H * dpr);
    cv.style.width = W + 'px';
    cv.style.height = H + 'px';
    ctx.scale(dpr, dpr);
    draw();
}

new ResizeObserver(resize).observe(wrap);

// ── INIT ──────────────────────────────────────────────────────
resize();

// Try to load candles.json automatically
fetch('backend/candles.json')
    .then(response => response.json())
    .then(jsonData => {
        if (jsonData && jsonData.candles && jsonData.candles.length > 0) {
            data = jsonData.candles;
            document.getElementById('symLabel').textContent = jsonData.symbol || 'EURUSD';
            
            vCount = Math.min(80, data.length);
            vStart = Math.max(0, data.length - vCount);
            
            const first = new Date(data[0].t);
            const last = new Date(data[data.length - 1].t);
            document.getElementById('sR').textContent = 
                first.toLocaleDateString() + ' - ' + last.toLocaleDateString();
            document.getElementById('sH').textContent = 
                `${data.length} candles loaded · scroll=zoom · drag=pan · dbl-click=reset`;
            
            draw();
        }
    })
    .catch(() => {
        // Silently fail if candles.json doesn't exist
        document.getElementById('sH').textContent = 'load candles.json to begin · scroll=zoom · drag=pan · dbl-click=reset';
    });

// ── DRAW ──────────────────────────────────────────────────────
function draw() {
    // reset ctx
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
    ctx.textAlign = 'left';
    ctx.clearRect(0, 0, cv.width, cv.height);
    
    const sl = slice();
    if (!sl.length) return;
    
    const { hi, lo } = extent(sl);
    const w = cW(), h = cH();
    const slot = w / sl.length;
    const cw = Math.max(1, px(slot * 0.65));
    const hw = Math.max(1, Math.floor(cw / 2));
    
    // GRID
    ctx.strokeStyle = 'rgba(0,0,0,.05)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 5; i++) {
        const y = px(toY(lo + (hi - lo) * i / 5, lo, hi));
        ctx.beginPath();
        ctx.moveTo(P.left, y);
        ctx.lineTo(W - P.right, y);
        ctx.stroke();
    }
    
    // PRICE AXIS
    ctx.fillStyle = '#aaa';
    ctx.font = "10px 'Courier New',monospace";
    ctx.textAlign = 'left';
    for (let i = 0; i <= 5; i++) {
        const p = lo + (hi - lo) * i / 5;
        const y = px(toY(p, lo, hi));
        ctx.fillText(fmt(p), W - P.right + 5, y + 3);
    }
    
    // TIME AXIS
    ctx.fillStyle = '#bbb';
    ctx.textAlign = 'center';
    const ev = Math.ceil(sl.length / 7);
    sl.forEach((c, i) => {
        if (i % ev !== 0) return;
        const x = px(P.left + i * slot + slot / 2);
        const d = new Date(c.t);
        ctx.fillText(String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'), x, H - P.bot + 14);
    });
    
    // PRE-CALC candle pixels
    const bulls = [], bears = [];
    sl.forEach((c, i) => {
        const isBull = c.c >= c.o;
        const cx = px(P.left + i * slot + slot / 2);
        const bt = px(toY(Math.max(c.o, c.c), lo, hi));
        const bb = px(toY(Math.min(c.o, c.c), lo, hi));
        const bh = Math.max(1, bb - bt);
        const wt = px(toY(c.h, lo, hi));
        const wb = px(toY(c.l, lo, hi));
        (isBull ? bulls : bears).push({ cx, bt, bb, bh, wt, wb });
    });
    
    // PASS 1 — ALL WICKS batched
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.beginPath();
    [...bulls, ...bears].forEach(({ cx, bt, bb, wt, wb }) => {
        if (wt < bt) { ctx.moveTo(cx, wt); ctx.lineTo(cx, bt) }   // upper wick
        if (wb > bb) { ctx.moveTo(cx, bb); ctx.lineTo(cx, wb) }    // lower wick
    });
    ctx.stroke();
    
    // PASS 2 — BULL BODIES (hollow: white fill + black border)
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    bulls.forEach(({ cx, bt, bh }) => {
        ctx.fillRect(cx - hw, bt, cw, bh);
        ctx.strokeRect(cx - hw + 0.5, bt + 0.5, cw - 1, Math.max(0, bh - 1));
    });
    
    // PASS 3 — BEAR BODIES (solid black)
    ctx.fillStyle = '#000';
    bears.forEach(({ cx, bt, bh }) => ctx.fillRect(cx - hw, bt, cw, bh));
    
    // LAST PRICE LINE + TAG
    const last = sl[sl.length - 1];
    const ly = px(toY(last.c, lo, hi));
    const isBullLast = last.c >= last.o;
    ctx.setLineDash([2, 4]);
    ctx.strokeStyle = 'rgba(0,0,0,.2)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(P.left, ly);
    ctx.lineTo(W - P.right, ly);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // tag box
    const tH = 16, tW = P.right - 2;
    ctx.fillStyle = isBullLast ? '#089981' : '#f23645';
    ctx.fillRect(W - P.right + 1, ly - tH / 2, tW, tH);
    ctx.fillStyle = '#fff';
    ctx.font = "bold 9px 'Courier New',monospace";
    ctx.textAlign = 'center';
    ctx.fillText(fmt(last.c), W - P.right + tW / 2, ly + 3);
    
    // CROSSHAIR
    if (mx > P.left && mx < W - P.right && my > P.top && my < H - P.bot) {
        ctx.setLineDash([2, 4]);
        ctx.strokeStyle = 'rgba(0,0,0,.18)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(mx, P.top);
        ctx.lineTo(mx, H - P.bot);
        ctx.moveTo(P.left, my);
        ctx.lineTo(W - P.right, my);
        ctx.stroke();
        ctx.setLineDash([]);
        
        // hover price label
        const hp = lo + (hi - lo) * (1 - (my - P.top) / cH());
        ctx.fillStyle = '#555';
        ctx.font = "9px 'Courier New',monospace";
        ctx.textAlign = 'left';
        ctx.fillText(fmt(hp), W - P.right + 5, my + 3);
    }
    
    // OHLC BAR update
    const idx = Math.floor((mx - P.left) / slot);
    const hov = (idx >= 0 && idx < sl.length) ? sl[idx] : last;
    const pct = ((hov.c - hov.o) / hov.o * 100).toFixed(2);
    document.getElementById('vO').textContent = fmt(hov.o);
    document.getElementById('vH').textContent = fmt(hov.h);
    document.getElementById('vL').textContent = fmt(hov.l);
    document.getElementById('vC').textContent = fmt(hov.c);
    const pEl = document.getElementById('pct');
    pEl.textContent = (hov.c >= hov.o ? '+' : '') + pct + '%';
    pEl.style.color = hov.c >= hov.o ? '#089981' : '#f23645';
    
    document.getElementById('sN').textContent = data.length;
    document.getElementById('sL').textContent = fmt(last.c);
}

// ── TOOLTIP ───────────────────────────────────────────────────
function updateTip(e) {
    const rc = wrap.getBoundingClientRect();
    const ex = e.clientX - rc.left, ey = e.clientY - rc.top;
    const sl = slice();
    if (!sl.length) return;
    
    const slot = cW() / sl.length;
    const i = Math.floor((ex - P.left) / slot);
    if (i >= 0 && i < sl.length) {
        const c = sl[i], pct = ((c.c - c.o) / c.o * 100).toFixed(2);
        const d = new Date(c.t);
        const dt = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + '  ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        tip.innerHTML = `<div class="tdate">${dt}</div><div class="trow"><span>O</span><span class="tv">${fmt(c.o)}</span></div><div class="trow"><span>H</span><span class="tv">${fmt(c.h)}</span></div><div class="trow"><span>L</span><span class="tv">${fmt(c.l)}</span></div><div class="trow"><span>C</span><span class="tv">${fmt(c.c)}</span></div><div class="trow"><span>Δ</span><span class="tv">${c.c >= c.o ? '+' : ''}${pct}%</span></div>`;
        tip.style.display = 'block';
        const tw = tip.offsetWidth, th = tip.offsetHeight;
        const tx = ex + 14 + tw > W ? ex - tw - 8 : ex + 14;
        const ty = Math.max(P.top, Math.min(ey - th / 2, H - P.bot - th));
        tip.style.left = tx + 'px';
        tip.style.top = ty + 'px';
    } else tip.style.display = 'none';
}

// ── EVENTS ────────────────────────────────────────────────────
wrap.addEventListener('mousemove', e => {
    const rc = wrap.getBoundingClientRect();
    mx = e.clientX - rc.left;
    my = e.clientY - rc.top;
    if (drag) {
        const dx = mx - dragX;
        const delta = Math.round(-dx / (cW() / vCount));
        vStart = Math.max(0, Math.min(dragS + delta, data.length - vCount));
    }
    updateTip(e);
    draw();
});

wrap.addEventListener('mouseleave', () => {
    mx = -1;
    my = -1;
    tip.style.display = 'none';
    drag = false;
    wrap.style.cursor = 'crosshair';
    draw();
});

wrap.addEventListener('mousedown', e => {
    drag = true;
    dragX = e.clientX - wrap.getBoundingClientRect().left;
    dragS = vStart;
    wrap.style.cursor = 'grabbing';
});

wrap.addEventListener('mouseup', () => {
    drag = false;
    wrap.style.cursor = 'crosshair';
});

wrap.addEventListener('wheel', e => {
    e.preventDefault();
    vCount = Math.max(10, Math.min(data.length, vCount + (e.deltaY > 0 ? 8 : -8)));
    vStart = Math.max(0, Math.min(vStart, data.length - vCount));
    draw();
}, { passive: false });

wrap.addEventListener('dblclick', () => {
    vCount = 80;
    vStart = Math.max(0, data.length - vCount);
    draw();
});

// ── TIMEFRAME ─────────────────────────────────────────────────
window.rebuildTF = function(tf) {
    document.querySelectorAll('.tf').forEach(b => b.classList.remove('on'));
    const btn = document.querySelector(`#tf-${tf}`);
    if (btn) btn.classList.add('on');
    
    // Filter data based on timeframe if we have data
    if (data.length > 0) {
        draw();
    }
};

// ── FILE LOADING ──────────────────────────────────────────────
window.loadFile = function(input) {
    const file = input.files[0];
    if (!file) return;
    
    showOverlay('Loading file...');
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const content = e.target.result;
            let jsonData;
            
            if (file.name.endsWith('.json')) {
                jsonData = JSON.parse(content);
            } else if (file.name.endsWith('.csv')) {
                // Parse CSV format
                const lines = content.split('\n').filter(line => line.trim());
                const headers = lines[0].split(',');
                jsonData = {
                    symbol: 'EURUSD',
                    timeframe: '1h',
                    candles: []
                };
                
                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(',');
                    if (values.length >= 5) {
                        jsonData.candles.push({
                            t: parseInt(values[0]) || Date.parse(values[0]),
                            o: parseFloat(values[1]),
                            h: parseFloat(values[2]),
                            l: parseFloat(values[3]),
                            c: parseFloat(values[4])
                        });
                    }
                }
            }
            
            if (jsonData && jsonData.candles && jsonData.candles.length > 0) {
                data = jsonData.candles;
                document.getElementById('symLabel').textContent = jsonData.symbol || 'EURUSD';
                
                // Set initial view
                vCount = Math.min(80, data.length);
                vStart = Math.max(0, data.length - vCount);
                
                // Update status
                const first = new Date(data[0].t);
                const last = new Date(data[data.length - 1].t);
                document.getElementById('sR').textContent = 
                    first.toLocaleDateString() + ' - ' + last.toLocaleDateString();
                document.getElementById('sH').textContent = 
                    `${data.length} candles loaded · scroll=zoom · drag=pan · dbl-click=reset`;
                
                hideOverlay();
                draw();
            } else {
                throw new Error('Invalid file format');
            }
        } catch (error) {
            hideOverlay();
            alert('Error loading file: ' + error.message);
        }
    };
    
    reader.readAsText(file);
};

// ── OVERLAY HELPERS ───────────────────────────────────────────
function showOverlay(msg) {
    const overlay = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlayMsg');
    overlayMsg.textContent = msg;
    overlay.style.display = 'flex';
}

function hideOverlay() {
    document.getElementById('overlay').style.display = 'none';
}

// ── RESIZE ────────────────────────────────────────────────────
function resize() {
    dpr = window.devicePixelRatio || 1;
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    cv.width = Math.round(W * dpr);
    cv.height = Math.round(H * dpr);
    cv.style.width = W + 'px';
    cv.style.height = H + 'px';
    ctx.scale(dpr, dpr);
    draw();
}

new ResizeObserver(resize).observe(wrap);

// ── INIT ──────────────────────────────────────────────────────
resize();

// Try to load candles.json automatically
fetch('backend/candles.json')
    .then(response => response.json())
    .then(jsonData => {
        if (jsonData && jsonData.candles && jsonData.candles.length > 0) {
            data = jsonData.candles;
            document.getElementById('symLabel').textContent = jsonData.symbol || 'EURUSD';
            
            vCount = Math.min(80, data.length);
            vStart = Math.max(0, data.length - vCount);
            
            const first = new Date(data[0].t);
            const last = new Date(data[data.length - 1].t);
            document.getElementById('sR').textContent = 
                first.toLocaleDateString() + ' - ' + last.toLocaleDateString();
            document.getElementById('sH').textContent = 
                `${data.length} candles loaded · scroll=zoom · drag=pan · dbl-click=reset`;
            
            draw();
        }
    })
    .catch(() => {
        // Silently fail if candles.json doesn't exist
        document.getElementById('sH').textContent = 'load candles.json to begin · scroll=zoom · drag=pan · dbl-click=reset';
    });
</script>
