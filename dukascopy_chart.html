<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dukascopy Chart</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#fff;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;font-family:'Courier New',monospace}
/* ── TOP BAR ── */
#top{display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid #efefef;flex-shrink:0;flex-wrap:wrap}
.sym{font-size:13px;font-weight:700;letter-spacing:.07em;color:#222;min-width:70px}
.tfs{display:flex;border:1px solid #e2e2e2;border-radius:2px;overflow:hidden}
.tf{background:none;border:none;border-right:1px solid #e2e2e2;padding:4px 9px;font:10px 'Courier New',monospace;cursor:pointer;color:#999;transition:all .1s}
.tf:last-child{border-right:none}
.tf:hover{background:#f5f5f5;color:#333}
.tf.on{background:#089981;color:#fff}
.sp{flex:1}
/* load button */
#loadBtn{display:flex;align-items:center;gap:5px;padding:4px 11px;border:1px solid #e2e2e2;background:#fff;font:10px 'Courier New',monospace;cursor:pointer;color:#555;border-radius:2px;transition:all .12s}
#loadBtn:hover{border-color:#089981;color:#089981}
#fileIn{display:none}
/* live badge */
#live{background:#1a73e8;color:#fff;font-size:9px;font-weight:700;letter-spacing:.12em;padding:3px 7px;border-radius:2px}
/* ohlc */
#obar{display:flex;gap:13px;font-size:10px;color:#aaa;letter-spacing:.02em}
#obar b{font-weight:600}
#pct{font-weight:700;min-width:60px}
/* ── CHART ── */
#cw{flex:1;position:relative;overflow:hidden;cursor:crosshair;background:#fff}
canvas{position:absolute;top:0;left:0;display:block}
/* ── TOOLTIP ── */
#tt{position:absolute;background:rgba(255,255,255,.97);border:1px solid #ddd;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:9px 12px;font:10px 'Courier New',monospace;line-height:2;pointer-events:none;display:none;z-index:20;min-width:140px}
.tdate{color:#aaa;font-size:9px;margin-bottom:3px;letter-spacing:.03em}
.trow{display:flex;justify-content:space-between;gap:14px}
.tv{font-weight:700;letter-spacing:.02em}
/* ── STATUS ── */
#sb{display:flex;align-items:center;gap:18px;padding:4px 12px;border-top:1px solid #f0f0f0;font-size:9px;color:#ccc;flex-shrink:0;flex-wrap:wrap}
#sb b{color:#aaa}
#prog{display:none;align-items:center;gap:8px;font-size:10px;color:#1a73e8}
.spinner{width:12px;height:12px;border:2px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
<!-- TOP BAR -->
<div id="top">
<span class="sym" id="symLabel">EURUSD</span>
<div class="tfs">
<button class="tf" onclick="rebuildTF('1m')">1m</button>
<button class="tf" onclick="rebuildTF('5m')">5m</button>
<button class="tf" onclick="rebuildTF('15m')">15m</button>
<button class="tf on" id="tf-1h" onclick="rebuildTF('1h')">1H</button>
<button class="tf" onclick="rebuildTF('4h')">4H</button>
<button class="tf" onclick="rebuildTF('1d')">1D</button>
</div>
<!-- File loader -->
<input type="file" id="fileIn" accept=".json,.csv" onchange="loadFile(this)">
<button id="loadBtn" onclick="document.getElementById('fileIn').click()">📂 Load candles.json</button>
<div class="sp"></div>
<span id="live">LIVE</span>
<div id="obar">
<span>O&nbsp;<b id="vO">—</b></span>
<span>H&nbsp;<b id="vH">—</b></span>
<span>L&nbsp;<b id="vL">—</b></span>
<span>C&nbsp;<b id="vC">—</b></span>
<span id="pct">—</span>
</div>
</div>
<!-- CHART -->
<div id="cw">
<canvas id="cv"></canvas>
<div id="tt"></div>
<!-- Loading overlay -->
<div id="overlay" style="display:none;position:absolute;inset:0;background:rgba(255,255,255,.85);align-items:center;justify-content:center;flex-direction:column;gap:12px;font:12px 'Courier New',monospace;color:#555">
<div class="spinner" style="width:24px;height:24px;border-width:3px"></div>
<span id="overlayMsg">Loading...</span>
</div>
</div>
<!-- STATUS -->
<div id="sb">
<span><b id="sN">0</b> candles</span>
<span>range&nbsp;<b id="sR">—</b></span>
<span>last&nbsp;<b id="sL">—</b></span>
<span id="sH">load candles.json to begin · scroll=zoom · drag=pan · dbl-click=reset</span>
</div>
</div>
<script>
