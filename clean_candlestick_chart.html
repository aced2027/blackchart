<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Candlestick Chart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; 
      background: #f5f5f5;
      padding: 20px;
    }
    .container { 
      max-width: 1600px; 
      margin: 0 auto; 
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 20px;
    }
    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      align-items: center;
      padding: 10px;
      background: #fafafa;
      border-radius: 6px;
    }
    button {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      font-size: 12px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    button:hover { background: #f5f5f5; }
    button.active { background: #333; color: white; }
    #chartCanvas { 
      display: block; 
      cursor: crosshair;
      background: white;
    }
    input[type="number"] {
      width: 70px;
      padding: 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
    }
    label { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <div class="controls">
      <button class="tf-btn active" data-tf="1m">1m</button>
      <button class="tf-btn" data-tf="5m">5m</button>
      <button class="tf-btn" data-tf="15m">15m</button>
      <button class="tf-btn" data-tf="1H">1H</button>
      <button class="tf-btn" data-tf="4H">4H</button>
      <button class="tf-btn" data-tf="1D">1D</button>
      <label>Count: <input type="number" id="candleCount" value="150" min="50" max="500"></label>
    </div>
    <canvas id="chartCanvas"></canvas>
  </div>
